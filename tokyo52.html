<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOKYO 52</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@300;400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root{--bg:#050508;--bg2:#0a0e17;--card:#0c1018;--txt:#c9d1d9;--txtb:#e6edf3;--txtm:#484f58;--acc:#00ff41;--acc2:#00cc33;--put:#ff3366;--brd:#151d2b;--r:8px;--fl:'Orbitron',monospace;--fa:'Cairo',sans-serif;--fm:'Share Tech Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fa);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--acc2);border-radius:3px}
#mc{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.3}
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}
header{background:linear-gradient(180deg,rgba(10,14,23,.97),rgba(5,5,8,.95));border-bottom:1px solid var(--brd);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.logo{font-family:var(--fl);font-weight:900;font-size:1.5rem;color:var(--acc);text-shadow:0 0 20px rgba(0,255,65,.5);letter-spacing:3px}
.sdot{width:10px;height:10px;border-radius:50%;background:#ff3366;transition:.3s}.sdot.on{background:var(--acc);box-shadow:0 0 8px rgba(0,255,65,.6);animation:pd 2s infinite}
@keyframes pd{0%,100%{box-shadow:0 0 8px rgba(0,255,65,.6)}50%{box-shadow:0 0 16px rgba(0,255,65,.9)}}
.hi{margin-right:auto;display:flex;gap:16px;font-size:.8rem;color:var(--txtm);align-items:center}.hi i{color:var(--acc);margin-left:4px}
.ab{font-size:.7rem;padding:2px 10px;border-radius:10px;font-weight:700;letter-spacing:1px}
.ab.d{background:rgba(255,193,7,.12);color:#ffc107;border:1px solid rgba(255,193,7,.3)}
.ab.r{background:rgba(0,255,65,.12);color:var(--acc);border:1px solid rgba(0,255,65,.3)}
.ctrl{background:var(--bg2);border-bottom:1px solid var(--brd);padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn{font-family:var(--fa);font-weight:600;font-size:.82rem;padding:8px 18px;border:1px solid var(--brd);border-radius:var(--r);cursor:pointer;transition:.25s;display:inline-flex;align-items:center;gap:6px;outline:none}
.bs{background:rgba(0,255,65,.1);border-color:var(--acc2);color:var(--acc)}.bs:hover{background:rgba(0,255,65,.22)}
.bx{background:rgba(255,51,102,.08);border-color:#cc2952;color:var(--put)}.bx:hover{background:rgba(255,51,102,.18)}
.bc{background:var(--card);color:var(--txt);border-color:var(--brd)}.bc:hover{border-color:var(--acc2);color:var(--acc)}
.tw{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--txtm)}
.tg{width:44px;height:24px;background:#1a1f2e;border-radius:12px;position:relative;cursor:pointer;transition:.3s;border:1px solid var(--brd)}
.tg.on{background:rgba(0,255,65,.2);border-color:var(--acc2)}
.tg::after{content:'';position:absolute;top:3px;right:3px;width:16px;height:16px;background:#555;border-radius:50%;transition:.3s}
.tg.on::after{right:23px;background:var(--acc);box-shadow:0 0 8px rgba(0,255,65,.5)}
.ai{width:80px;background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:6px 10px;color:var(--txtb);font-family:var(--fm);font-size:.85rem;text-align:center;outline:none;direction:ltr}
.sep{width:1px;height:28px;background:var(--brd);margin:0 4px}
.sts{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:14px 24px}
.sc{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:12px 16px}
.sl{font-size:.72rem;color:var(--txtm);display:flex;align-items:center;gap:5px}.sl i{color:var(--acc);font-size:.7rem}
.sv{font-family:var(--fm);font-size:1.3rem;font-weight:700;color:var(--txtb)}.sv.g{color:var(--acc)}
.mn{display:grid;grid-template-columns:280px 1fr;gap:0;flex:1;overflow:hidden}
.ap{background:var(--bg2);border-left:1px solid var(--brd);overflow-y:auto;max-height:calc(100vh - 180px);padding:8px 0}
.ch{display:flex;align-items:center;gap:8px;padding:10px 16px;cursor:pointer;font-weight:700;font-size:.85rem;color:var(--txtb);border-bottom:1px solid var(--brd);user-select:none}
.ch:hover{background:rgba(0,255,65,.05)}.ch i.ar{margin-right:auto;transition:.3s;font-size:.65rem;color:var(--txtm)}.ch.op i.ar{transform:rotate(90deg)}
.ci{max-height:0;overflow:hidden;transition:max-height .35s}.ci.op{max-height:2000px}
.ai2{display:flex;align-items:center;gap:8px;padding:6px 16px 6px 24px;font-size:.8rem;cursor:pointer;transition:.15s;color:var(--txtm)}
.ai2:hover{background:rgba(0,255,65,.04);color:var(--txt)}
.ai2 input[type=checkbox]{appearance:none;width:16px;height:16px;border:1px solid var(--brd);border-radius:3px;cursor:pointer;flex-shrink:0;transition:.2s}
.ai2 input[type=checkbox]:checked{background:var(--acc);border-color:var(--acc)}
.sf{overflow-y:auto;max-height:calc(100vh - 180px);padding:16px 20px}
.card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:16px;margin-bottom:12px;animation:ci2 .4s ease-out}
.card.cal{border-right:3px solid var(--acc)}.card.put{border-right:3px solid var(--put)}
@keyframes ci2{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.ct{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.cn{font-weight:700;font-size:1rem;color:var(--txtb)}
.badge{font-family:var(--fm);font-weight:700;font-size:.75rem;padding:3px 12px;border-radius:4px;letter-spacing:1px}
.badge.cal{background:rgba(0,255,65,.12);color:var(--acc);border:1px solid rgba(0,255,65,.3)}
.badge.put{background:rgba(255,51,102,.1);color:var(--put);border:1px solid rgba(255,51,102,.25)}
.cf{font-family:var(--fm);font-weight:700;font-size:1.1rem;margin-right:auto}
.cf.hi2{color:var(--acc)}.cf.mi{color:#f0ad4e}.cf.lo{color:var(--put)}
.cbar{height:4px;background:var(--bg);border-radius:2px;margin-bottom:12px;overflow:hidden}
.cfill{height:100%;border-radius:2px;transition:width .6s}.cfill.hi2{background:linear-gradient(90deg,var(--acc2),var(--acc))}.cfill.mi{background:linear-gradient(90deg,#e0a800,#f0ad4e)}.cfill.lo{background:linear-gradient(90deg,#cc2952,var(--put))}
.gr{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-bottom:10px;font-size:.78rem}
.gl{color:var(--txtm)}.gv{color:var(--txtb);font-family:var(--fm);direction:ltr;text-align:left}
.tc{position:fixed;top:80px;left:20px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.tt{pointer-events:auto;background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:10px 16px;display:flex;align-items:center;gap:10px;font-size:.82rem;box-shadow:0 8px 24px rgba(0,0,0,.5);animation:ti .35s ease;min-width:240px}
@keyframes ti{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes to2{to{opacity:0;transform:translateX(-30px)}}

.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.modal{background:var(--bg2);border:1px solid var(--acc2);border-radius:var(--r);padding:30px;width:90%;max-width:400px;box-shadow:0 0 30px rgba(0,255,65,.1)}
.modal h2{text-align:center;color:var(--acc);font-family:var(--fl);margin-bottom:20px;font-size:1.2rem}
.fg{margin-bottom:15px}
.fg label{display:block;font-size:.8rem;color:var(--txtm);margin-bottom:5px}
.fg input{width:100%;padding:10px;background:var(--card);border:1px solid var(--brd);border-radius:var(--r);color:var(--txtb);font-family:var(--fa);outline:none;direction:ltr}
.fg input:focus{border-color:var(--acc2)}
.modal-btn{width:100%;padding:12px;background:var(--acc2);color:#000;border:none;border-radius:var(--r);font-weight:700;font-size:1rem;cursor:pointer;font-family:var(--fa);transition:.2s;margin-top:10px}
.modal-btn:hover{background:var(--acc);box-shadow:0 0 15px rgba(0,255,65,.3)}
.toggle-form{text-align:center;margin-top:15px;font-size:.85rem;color:var(--txtm);cursor:pointer}
.toggle-form span{color:var(--acc);font-weight:700}
.admin-badge{background:rgba(255,215,0,.15);color:#ffd700;border:1px solid #ffd700;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:700;margin-right:10px}
.tabs{display:flex;gap:8px;margin-bottom:16px;border-bottom:1px solid var(--brd);padding-bottom:8px}
.tab-btn{background:transparent;border:none;color:var(--txtm);font-family:var(--fa);font-size:.9rem;font-weight:700;cursor:pointer;padding:8px 16px;transition:.2s}
.tab-btn.active{color:var(--acc);border-bottom:2px solid var(--acc);background:rgba(0,255,65,.05)}

@media(max-width:900px){.mn{grid-template-columns:1fr}.ap{position:fixed;top:0;right:-300px;width:280px;height:100vh;z-index:200;transition:.3s}.ap.op2{right:0}.mt{display:flex!important}.hi{display:none}}
.mt{display:none;position:fixed;bottom:20px;left:20px;z-index:150;width:48px;height:48px;border-radius:50%;background:var(--acc);color:#000;border:none;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,255,65,.3);align-items:center;justify-content:center}
</style>
</head>
<body>
<canvas id="mc"></canvas>

<div class="modal-bg" id="authModal">
  <div class="modal">
    <h2 id="authTitle">تسجيل الدخول - طوكيو 52</h2>
    <div id="loginForm">
      <div class="fg"><label>البريد الإلكتروني</label><input type="email" id="loginEmail"></div>
      <div class="fg"><label>كلمة المرور</label><input type="password" id="loginPass"></div>
      <button class="modal-btn" onclick="login()">دخول</button>
      <div class="toggle-form" onclick="toggleAuth()">ليس لديك حساب؟ <span>سجل الآن</span></div>
    </div>
    <div id="regForm" style="display:none">
      <div class="fg"><label>الاسم الأول</label><input type="text" id="regFname"></div>
      <div class="fg"><label>الاسم الأخير</label><input type="text" id="regLname"></div>
      <div class="fg"><label>البريد الإلكتروني</label><input type="email" id="regEmail"></div>
      <div class="fg"><label>كلمة المرور</label><input type="password" id="regPass"></div>
      <button class="modal-btn" onclick="register()">تسجيل</button>
      <div class="toggle-form" onclick="toggleAuth()">لديك حساب؟ <span>سجل الدخول</span></div>
    </div>
  </div>
</div>

<div class="app" id="mainApp" style="display:none">
<header>
  <div class="logo">TOKYO 52</div>
  <div style="display:flex;align-items:center;gap:8px;font-size:.85rem"><div class="sdot" id="dot"></div><span id="stxt">غير متصل</span></div>
  <span class="ab d" id="abdg">DEMO</span>
  <span class="admin-badge" id="adminBadge" style="display:none">ADMIN</span>
  <div class="hi">
    <span><i class="fas fa-clock"></i> <span id="clk">--:--:--</span></span>
    <span><i class="fas fa-wallet"></i> <span id="bal">---</span></span>
    <span style="cursor:pointer;color:var(--put)" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</span>
  </div>
</header>

<div class="ctrl" id="adminCtrl">
  <button class="btn bs" onclick="startScan()"><i class="fas fa-play"></i> تشغيل</button>
  <button class="btn bx" onclick="stopScan()"><i class="fas fa-stop"></i> إيقاف</button>
  <div class="sep"></div>
  <div class="tw">تداول تلقائي<div class="tg" id="atTg" onclick="togAT()"></div></div>
  <label style="font-size:.78rem;color:var(--txtm);display:flex;align-items:center;gap:4px">المبلغ: <input type="number" class="ai" id="amt" value="1" min="1" step="1"></label>
  <div class="sep"></div>
  <div class="tw">حساب حقيقي<div class="tg" id="acTg" onclick="togAC()"></div></div>
  <div class="sep"></div>
  <button class="btn bc" onclick="selAll()"><i class="fas fa-check-double"></i> تحديد الكل</button>
  <button class="btn bc" onclick="clrSig()"><i class="fas fa-trash-alt"></i> مسح</button>
</div>

<div class="sts">
  <div class="sc"><div class="sl"><i class="fas fa-signal"></i> الإشارات</div><div class="sv" id="s1">0</div></div>
  <div class="sc"><div class="sl"><i class="fas fa-fire"></i> قوية</div><div class="sv g" id="s2">0</div></div>
  <div class="sc"><div class="sl"><i class="fas fa-bolt"></i> صفقات</div><div class="sv" id="s3">0</div></div>
  <div class="sc"><div class="sl"><i class="fas fa-chart-line"></i> CALL/PUT</div><div class="sv" id="s4">0/0</div></div>
</div>

<div class="mn">
  <aside class="ap" id="apanel"><div id="ac"></div></aside>
  <section class="sf">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('live')"><i class="fas fa-satellite-dish"></i> الإشارات المباشرة</button>
      <button class="tab-btn" onclick="switchTab('lst')"><i class="fas fa-forward"></i> إشارات اللستات</button>
    </div>
    
    <div id="liveTab">
      <div id="cards"><div style="text-align:center;padding:60px 20px;color:var(--txtm)"><i class="fas fa-satellite-dish" style="font-size:3rem;display:block;margin-bottom:12px;opacity:.3"></i><p>اضغط تشغيل لبدء التحليل</p></div></div>
    </div>
    
    <div id="lstTab" style="display:none">
      <div id="lstCards"><div style="text-align:center;padding:60px 20px;color:var(--txtm)"><i class="fas fa-hourglass-half" style="font-size:3rem;display:block;margin-bottom:12px;opacity:.3"></i><p>جاري تحليل اللستات القادمة...</p></div></div>
    </div>
  </section>
</div>
</div>

<div class="tc" id="tc"></div>
<button class="mt" onclick="document.getElementById('apanel').classList.toggle('op2')"><i class="fas fa-list"></i></button>

<script>
var API = ''; // يأخذ الرابط تلقائياً من نفس الدومين
var ADMIN_EMAIL = 'x52anasx@gmail.com';
var currentUser = null;

// ═══ نظام التنبيهات (Toast) ═══
function toast(msg) {
  var c = document.getElementById('tc'), t = document.createElement('div');
  t.className = 'tt';
  t.innerHTML = '<span style="color:var(--txtb)">' + msg + '</span>';
  c.appendChild(t);
  setTimeout(function() { t.style.animation = 'to2 .3s ease forwards'; setTimeout(function() { t.remove(); }, 300); }, 3500);
}

// ═══ نظام المصداقية ═══
function toggleAuth() {
  var l = document.getElementById('loginForm');
  var r = document.getElementById('regForm');
  var t = document.getElementById('authTitle');
  if (l.style.display === 'none') {
    l.style.display = 'block'; r.style.display = 'none'; t.textContent = 'تسجيل الدخول';
  } else {
    l.style.display = 'none'; r.style.display = 'block'; t.textContent = 'تسجيل جديد';
  }
}

function login() {
  var email = document.getElementById('loginEmail').value;
  var pass = document.getElementById('loginPass').value;
  if(!email || !pass) { toast('الرجاء إدخال البيانات'); return; }
  
  toast('جاري التحقق...');
  
  fetch(API + '/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email: email, password: pass})
  })
  .then(r => r.json())
  .then(data => {
    if(data.success) {
      currentUser = {email: data.email, role: data.role, fname: data.fname};
      localStorage.setItem('tokyo52user', JSON.stringify(currentUser));
      initUI();
      toast('مرحباً بك، ' + data.fname);
    } else {
      toast(data.message || 'خطأ في تسجيل الدخول');
    }
  })
  .catch(err => { toast('خطأ في الاتصال بالسيرفر'); console.error(err); });
}

function register() {
  var email = document.getElementById('regEmail').value;
  var pass = document.getElementById('regPass').value;
  var fname = document.getElementById('regFname').value;
  var lname = document.getElementById('regLname').value;
  if(!email || !pass || !fname || !lname) { toast('الرجاء إكمال البيانات'); return; }
  
  toast('جاري إرسال الطلب...');
  
  fetch(API + '/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email: email, password: pass, fname: fname, lname: lname})
  })
  .then(r => r.json())
  .then(data => {
    if(data.success) {
      toast(data.message);
      toggleAuth();
    } else {
      toast(data.message || 'خطأ في التسجيل');
    }
  })
  .catch(err => { toast('خطأ في الاتصال'); console.error(err); });
}

function logout() {
  localStorage.removeItem('tokyo52user');
  currentUser = null;
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('authModal').style.display = 'flex';
}

function initUI() {
  if(!currentUser) return;
  if(currentUser.role === 'pending') { toast('حسابك قيد المراجعة'); return; }
  
  document.getElementById('authModal').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';
  
  if(currentUser.role === 'admin') {
    document.getElementById('adminCtrl').style.display = 'flex';
    document.getElementById('adminBadge').style.display = 'inline-block';
  } else {
    document.getElementById('adminCtrl').style.display = 'none';
    document.getElementById('adminBadge').style.display = 'none';
  }
}

// ═══ التبويبات ═══
function switchTab(tab) {
  var btns = document.querySelectorAll('.tab-btn');
  btns.forEach(b => b.classList.remove('active'));
  event.target.closest('.tab-btn').classList.add('active');
  document.getElementById('liveTab').style.display = tab === 'live' ? 'block' : 'none';
  document.getElementById('lstTab').style.display = tab === 'lst' ? 'block' : 'none';
}

// ═══ الحالة العامة ═══
var S = {conn:false, scanning:false, at:false, sigs:{}, lstSigs:[], sel:{}, real:false, si:null};

// ═══ قاموس الأصول ═══
var AD = {
  currencies:{l:'العملات',i:'fa-coins',it:[{id:'EURUSD_otc',n:'EUR/USD'},{id:'GBPUSD_otc',n:'GBP/USD'},{id:'USDJPY_otc',n:'USD/JPY'},{id:'USDMXN_otc',n:'USD/MXN'}]},
  commodities:{l:'السلع',i:'fa-gem',it:[{id:'XAUUSD_otc',n:'Gold'},{id:'XAGUSD_otc',n:'Silver'}]},
  crypto:{l:'الرقمي',i:'fa-bitcoin-sign',it:[{id:'BTCUSD_otc',n:'Bitcoin'},{id:'ETHUSD_otc',n:'Ethereum'}]},
  stocks:{l:'الأسهم',i:'fa-building',it:[{id:'MSFT_otc',n:'Microsoft'},{id:'META_otc',n:'Facebook'}]}
};

function buildA() {
  var c = document.getElementById('ac'), h = '';
  for (var k in AD) {
    var cat = AD[k];
    h += '<div class="ch op" onclick="this.classList.toggle(\'op\');this.nextElementSibling.classList.toggle(\'op\')"><i class="fas ' + cat.i + '" style="color:var(--acc);width:16px"></i>' + cat.l + '<i class="fas fa-chevron-left ar"></i></div><div class="ci op">';
    for (var j = 0; j < cat.it.length; j++) {
      var item = cat.it[j];
      h += '<label class="ai2"><input type="checkbox" value="' + item.id + '" onchange="if(this.checked)S.sel[this.value]=1;else delete S.sel[this.value]">' + item.n + '</label>';
    }
    h += '</div>';
  }
  c.innerHTML = h;
}

// ═══ Matrix Rain ═══
(function() {
  var c = document.getElementById('mc'), x = c.getContext('2d');
  function r() { c.width = innerWidth; c.height = innerHeight; }
  r(); addEventListener('resize', r);
  var ch = 'アイウ0123456789ABCDEF', fs = 14, cols, drops;
  function init() { cols = Math.floor(c.width / fs); drops = []; for (var i = 0; i < cols; i++) drops[i] = Math.random() * c.height / fs | 0; }
  init();
  function draw() {
    x.fillStyle = 'rgba(5,5,8,0.06)'; x.fillRect(0, 0, c.width, c.height);
    x.font = fs + 'px monospace';
    for (var i = 0; i < drops.length; i++) {
      x.fillStyle = 'rgba(0,255,65,' + (Math.random() * 0.2 + 0.08) + ')';
      x.fillText(ch[Math.random() * ch.length | 0], i * fs, drops[i] * fs);
      if (drops[i] * fs > c.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ═══ الساعة ═══
setInterval(function() { document.getElementById('clk').textContent = new Date().toLocaleTimeString('ar-EG', {hour12: false}); }, 1000);

// ═══ أزرار التحكم ═══
function startScan() { S.scanning = true; S.si = setInterval(pollSig, 2000); pollSig(); toast('بدأ المسح...'); }
function stopScan() { S.scanning = false; if (S.si) { clearInterval(S.si); S.si = null; } toast('تم الإيقاف'); }
function togAT() { S.at = !S.at; document.getElementById('atTg').classList.toggle('on', S.at); toast(S.at ? 'تداول تلقائي: مفعّل' : 'تداول تلقائي: معطّل'); }
function togAC() { S.real = !S.real; document.getElementById('acTg').classList.toggle('on', S.real); var b = document.getElementById('abdg'); b.className = 'ab ' + (S.real ? 'r' : 'd'); b.textContent = S.real ? 'REAL' : 'DEMO'; }
function selAll() { document.querySelectorAll('.ai2 input').forEach(function(cb) { cb.checked = true; S.sel[cb.value] = 1; }); toast('تم تحديد الكل'); }
function clrSig() { S.sigs = {}; render(); }

// ═══ جلب الإشارات (محاكاة مؤقتة) ═══
function pollSig() {
  if(Math.random() > 0.7) {
     var dummyAsset = ['EURUSD_otc', 'GBPUSD_otc', 'Gold_otc', 'BTCUSD_otc'][Math.floor(Math.random()*4)];
     var dummyDir = Math.random() > 0.5 ? 'call' : 'put';
     var dummyScore = Math.floor(Math.random() * 30) + 70;
     S.sigs[dummyAsset] = {
       asset: dummyAsset, asset_name: dummyAsset.replace('_otc',''), signal: dummyDir, score: dummyScore,
       expiry_minutes: 2, entry_time: new Date().toLocaleTimeString('ar-EG', {hour12:false}),
       exit_time: new Date(Date.now() + 120000).toLocaleTimeString('ar-EG', {hour12:false}),
       payout: (Math.random()*5+80).toFixed(1), pips_diff: (Math.random()*3).toFixed(2),
       profit: dummyDir === 'call' ? '+' + (10 * parseFloat((Math.random()*5+80).toFixed(1))/100).toFixed(2) + '$' : '-10$'
     };
     if(dummyScore > 85) {
       S.lstSigs.push({...S.sigs[dummyAsset], is_lst: true, entry_time: new Date(Date.now() + 300000).toLocaleTimeString('ar-EG', {hour12:false})});
     }
  }
  render();
  renderLst();
}

// ═══ عرض الإشارات المباشرة ═══
function render() {
  var c = document.getElementById('cards');
  var arr = [];
  for (var k in S.sigs) arr.push(S.sigs[k]);
  arr.sort(function(a, b) { return (b.score || 0) - (a.score || 0); });

  if (!arr.length) {
    c.innerHTML = '<div style="text-align:center;padding:40px;color:var(--txtm)"><p>لا إشارات حالياً</p></div>';
    return;
  }
  var h = '';
  for (var i = 0; i < arr.length; i++) {
    var s = arr[i];
    var ic = s.signal === 'call';
    var cc = s.score >= 80 ? 'hi2' : s.score >= 65 ? 'mi' : 'lo';
    
    h += '<div class="card ' + (ic ? 'cal' : 'put') + '"><div class="ct"><span class="cn">' + (s.asset_name || s.asset) + '</span><span class="badge ' + (ic ? 'cal' : 'put') + '">' + (ic ? 'CALL ▲' : 'PUT ▼') + '</span><span class="cf ' + cc + '">' + s.score + '%</span></div><div class="cbar"><div class="cfill ' + cc + '" style="width:' + Math.min(100, s.score) + '%"></div></div><div class="gr"><div><span class="gl">⏱ الدخول:</span> <span class="gv">' + (s.entry_time || '---') + '</span></div><div><span class="gl">🏁 الخروج:</span> <span class="gv">' + (s.exit_time || '---') + '</span></div><div><span class="gl">⏳ المدة:</span> <span class="gv">' + (s.expiry_minutes || 2) + ' د</span></div><div><span class="gl">💰 العائد:</span> <span class="gv" style="color:var(--acc)">' + (s.payout || '0') + '%</span></div><div><span class="gl">📊 الفارق:</span> <span class="gv">' + (s.pips_diff || '0') + ' نقطة</span></div><div><span class="gl">💵 النتيجة:</span> <span class="gv">' + (s.profit || 'بانتظار') + '</span></div></div></div>';
  }
  c.innerHTML = h;
}

// ═══ عرض إشارات اللستات ═══
function renderLst() {
  var c = document.getElementById('lstCards');
  if (!S.lstSigs.length) {
    c.innerHTML = '<div style="text-align:center;padding:40px;color:var(--txtm)"><p>لا توجد لستات قادمة حالياً</p></div>';
    return;
  }
  var h = '';
  for (var i = 0; i < S.lstSigs.length; i++) {
    var s = S.lstSigs[i];
    var ic = s.signal === 'call';
    h += '<div class="card" style="border-right:3px solid #17a2b8"><div class="ct"><span class="cn" style="color:#17a2b8"><i class="fas fa-forward"></i> ' + (s.asset_name || s.asset) + '</span><span class="badge ' + (ic ? 'cal' : 'put') + '">' + (ic ? 'CALL' : 'PUT') + '</span><span class="cf hi2">' + s.score + '%</span></div><div class="gr"><div><span class="gl">⏱ وقت الدخول المتوقع:</span> <span class="gv" style="color:#17a2b8">' + s.entry_time + '</span></div></div></div>';
  }
  c.innerHTML = h;
}

// ═══ التشغيل الأولي ═══
window.onload = function() {
  buildA();
  var saved = localStorage.getItem('tokyo52user');
  if(saved) {
    currentUser = JSON.parse(saved);
    initUI();
  }
};
</script>
</body>
